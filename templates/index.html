<!DOCTYPE html>
<html>
<head>
<title>AI Cancer Detection</title>

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

/* ===== SIDEBAR ===== */
.sidebar {
    position: fixed;
    width: 220px;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding-top: 30px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 15px;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.1);
}

/* ===== MAIN ===== */
.main {
    margin-left: 240px;
    padding: 40px;
}

/* ===== CARD ===== */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 25px;
    width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

/* ===== BUTTON ===== */
button {
    background: #00c6ff;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0072ff;
}

/* ===== IMAGE ===== */
img {
    margin-top: 10px;
    border-radius: 10px;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ===== TOGGLE MODE ===== */
.toggle {
    position: absolute;
    top: 20px;
    right: 30px;
    cursor: pointer;
}

/* DARK MODE */
.dark {
    background: #111;
}
</style>

<script>
function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🧠 AI Detect</h2>
    <a href="/">🏠 Home</a>
    <a href="/history">📁 History</a>
    <a href="/stats">📊 Stats</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="toggle" onclick="toggleMode()">🌙</div>

<h1>AI Cancer Detection System</h1>

<div class="card">

<form action="/predict" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required><br><br>
    <button type="submit">Predict</button>
</form>

<div id="spinner" style="display:none;">⏳ Processing...</div>

{% if prediction %}
<h3>Prediction: {{ prediction }}</h3>
<h4>Confidence: {{ confidence }}%</h4>
<img src="{{ url_for('static', filename='uploads/' + image) }}" width="250">
{% endif %}

</div>

</div>

</body>
</html>
