<!DOCTYPE html>
<html>
<head>
<title>History</title>
<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
table { margin:auto; border-collapse: collapse; }
td, th { padding:10px; border:1px solid white; }
</style>
</head>

<body>

<h2>📁 Prediction History</h2>

<table>
<tr>
<th>ID</th>
<th>Image</th>
<th>Result</th>
<th>Date</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
